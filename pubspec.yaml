name: ghar360
description: A Flutter real estate app with Bumble-inspired design using GetX
publish_to: 'none'
version: 1.0.7+12

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.6
  get_storage: ^2.1.1
  http: ^1.2.2
  supabase_flutter: ^2.10.0
  json_annotation: ^4.9.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.5
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  chewie: ^1.7.5
  flutter_svg: ^2.0.15+1
  intl: ^0.20.2
  geolocator: ^14.0.1
  geocoding: ^4.0.0
  maplibre_gl: 0.26.1
  logger: ^2.0.2+1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  webview_flutter: ^4.10.4
  webview_flutter_web: ^0.2.2+4
  webview_flutter_android: ^4.10.4
  image_network: ^2.1.2
  flutter_cache_manager: ^3.4.1
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  flutter_markdown: ^0.7.3
  package_info_plus: ^8.3.1
  universal_io: ^2.2.2
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.15.0
  video_player: ^2.9.2
  video_compress: ^3.1.3

  # Firebase Core + services (minimal, opt-in collection)
  firebase_core: ^4.1.1
  firebase_crashlytics: ^5.0.2
  firebase_analytics: ^12.0.2
  firebase_messaging: ^16.0.2
  firebase_performance: ^0.11.1
  firebase_remote_config: ^6.0.2
  firebase_in_app_messaging: ^0.9.0+2
  firebase_app_check: ^0.4.1
  # Local notifications for foreground FCM and app UX
  flutter_local_notifications: ^18.0.1
  # Native share sheets (Android/iOS/macOS/Web)
  share_plus: ^10.0.2

  # Deep linking via native App Links / Universal Links
  app_links: ^6.4.1

  meta: any
  in_app_update: ^4.2.5

  # Authentication: native Google Sign-In (ID-token flow) + nonce hashing
  google_sign_in: ^7.2.0
  crypto: ^3.0.7
  # Android phone-number hint picker (gated to Platform.isAndroid)
  smart_auth: ^3.2.0
  # SMS OTP autofill (CodeAutoFill mixin) — same major as 360-flatmates
  sms_autofill: ^2.3.0
  # Sign in with Apple (iOS App Store compliance; native ID-token flow).
  # Pinned to 7.x: 8.x requires Dart >=3.11 (project SDK floor is 3.8).
  sign_in_with_apple: ^7.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  import_sorter: ^4.6.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4
  mocktail: ^1.0.0

  path_provider_platform_interface: any
dependency_overrides:
  # Keep the Firebase core pinned to the current major to align with other Firebase SDKs.
  firebase_core: ^4.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env.development
    - .env.production

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

# Native launch screen configuration.
# Background colors match the app's first Flutter frame (Scaffold background)
# to avoid a color flash on cold start:
#   light -> AppDesignTokens.neutral50  (0xFFF9FAFB)
#   dark  -> AppDesignTokens.neutral900 (0xFF121417)
flutter_native_splash:
  color: "f9fafb"
  image: assets/icons/app_icon.png
  color_dark: "121417"
  image_dark: assets/icons/app_icon.png
  ios: true
  android: true
  web: false
  android_12:
    color: "f9fafb"
    image: assets/icons/app_icon.png
    color_dark: "121417"
    image_dark: assets/icons/app_icon.png
